name: Lint & Format

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff (lint)
        run: ruff check scripts/generate_skills_index.py

      - name: Ruff (format check)
        run: ruff format --check scripts/generate_skills_index.py

      - name: Markdown lint
        run: npx --yes markdownlint-cli2 \
          --config .markdownlint.json \
          README.md CONTRIBUTING.md SKILLS_INDEX.md
