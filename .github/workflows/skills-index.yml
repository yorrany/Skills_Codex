name: Validate Skills Index

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  skills-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate index
        run: python scripts/generate_skills_index.py

      - name: Validate index is clean
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "SKILLS_INDEX.md is out of date. Run: python scripts/generate_skills_index.py"
            git --no-pager diff
            exit 1
          fi
